name: Update MAL Trends

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run weekly (e.g. every Sunday at 00:00 UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  static-analysis:
    name: Flake8 Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run flake8
        run: flake8 bin/*

  update-and-publish:
    name: Update and Publish MAL Data
    needs: static-analysis
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update Manga Data
        env:
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
        run: bin/update manga

      - name: Update Anime Data
        env:
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
        run: bin/update anime

      - name: Upload Manga Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manga-data
          path: |
            data/manga.csv
            data/manga-ranking.csv
          retention-days: 3

      - name: Upload Anime Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anime-data
          path: |
            data/anime.csv
            data/anime-ranking.csv
          retention-days: 3

      - name: Commit and Publish
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            VERSION=$(date --utc +%Y.%m.%d)
            git commit -m "Update $VERSION [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            git tag $VERSION
            git push origin $VERSION
          else
            echo "Nothing to publish!"
          fi
